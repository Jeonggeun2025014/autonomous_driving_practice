<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Remote Controller</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="top-bar">
      <button id="connectBtn">Connect</button>
      <div id="status">Disconnected</div>
    </div>

    <div class="container">
      <div class="speed-row">
        <button class="speed" data-speed="0">0</button>
        <button class="speed" data-speed="25">25</button>
        <button class="speed" data-speed="50">50</button>
        <button class="speed" data-speed="75">75</button>
        <button class="speed" data-speed="100">100</button>
      </div>

      <div class="pad">
        <div class="pad-row">
          <button class="dir" data-dir="LEFT_FORWARD">◀︎</button>
          <button class="dir" data-dir="FORWARD">▲</button>
          <button class="dir" data-dir="RIGHT_FORWARD">▶︎</button>
        </div>
        <div class="pad-row">
          <button class="dir" data-dir="LEFT">◂</button>
          <div class="center"></div>
          <button class="dir" data-dir="RIGHT">▸</button>
        </div>
        <div class="pad-row">
          <button class="dir" data-dir="LEFT_BACK">◀︎</button>
          <button class="dir" data-dir="BACK">▼</button>
          <button class="dir" data-dir="RIGHT_BACK">▶︎</button>
        </div>
      </div>

      <div class="log" id="log"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
