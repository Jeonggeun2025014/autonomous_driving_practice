<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Remote Controller</title>
    <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json">
  </head>
  <body>
    <div class="top-bar">
  <button id="connectBtn">Connect</button>
  <input id="wsUrl" placeholder="ws://<PI_IP>:8765" style="margin-left:8px; padding:6px; border-radius:6px; width:160px" />
  <div id="status">Disconnected</div>
    </div>

    <div class="container">
      <div class="speed-row">
        <button class="speed" data-speed="0">0</button>
        <button class="speed" data-speed="25">25</button>
        <button class="speed" data-speed="50">50</button>
        <button class="speed" data-speed="75">75</button>
        <button class="speed" data-speed="100">100</button>
      </div>

      <div class="pad">
        <div class="pad-row">
          <button class="dir" data-dir="LEFT_FORWARD">
            <svg class="arrow lf" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 5 L19 19 H5 Z"/></svg>
          </button>
          <button class="dir" data-dir="FORWARD">
            <svg class="arrow up" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 5 L19 19 H5 Z"/></svg>
          </button>
          <button class="dir" data-dir="RIGHT_FORWARD">
            <svg class="arrow rf" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 5 L19 19 H5 Z"/></svg>
          </button>
        </div>
        <div class="pad-row">
          <button class="dir" data-dir="LEFT">
            <svg class="arrow left" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 5 L19 19 H5 Z"/></svg>
          </button>
          <div class="center"></div>
          <button class="dir" data-dir="RIGHT">
            <svg class="arrow right" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 5 L19 19 H5 Z"/></svg>
          </button>
        </div>
        <div class="pad-row">
          <button class="dir" data-dir="LEFT_BACK">
            <svg class="arrow lb" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 5 L19 19 H5 Z"/></svg>
          </button>
          <button class="dir" data-dir="BACK">
            <svg class="arrow down" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 5 L19 19 H5 Z"/></svg>
          </button>
          <button class="dir" data-dir="RIGHT_BACK">
            <svg class="arrow rb" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 5 L19 19 H5 Z"/></svg>
          </button>
        </div>
      </div>

      <div class="log" id="log"></div>
    </div>

    <script src="app.js"></script>
    <script>
      // register service worker for PWA installability
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
          console.log('Service worker registered');
        }).catch((e) => console.warn('SW register failed', e));
      }
    </script>
  </body>
</html>
